name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    name: typecheck · guard anti-hardcode · testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Verificação completa (tsc + lint:no-hardcode + testes)
        run: npm run check
